<html lang="en">

<style>

    --bg-2: #EFEAE1;

    --ink-2: #2A2A2D;

    --line-2: rgba(11,11,12,.14);

    --accent-ink: #0B3D26;
    --warn: #B7541E;
    --paper: #FFFDF8;

    --shadow-md: 0 1px 0 rgba(11,11,12,.05), 0 8px 24px -8px rgba(11,11,12,.12);

  html, body { margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);

    font-family: 'Geist', ui-sans-serif, system-ui, sans-serif;

    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;

  .serif { font-family: 'Instrument Serif', 'Times New Roman', serif; font-weight: 400; letter-spacing: -0.01em; }
  .mono { font-family: 'Geist Mono', ui-monospace, monospace; font-feature-settings: "ss01"; }
  .italic { font-style: italic; }
  ::selection { background: var(--accent); color: white; }

  .grain::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1000;
    opacity: .35;
    mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.04  0 0 0 0 0.04  0 0 0 0 0.04  0 0 0 0.18 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");

  .wrap { max-width: 1280px; margin: 0 auto; padding: 0 28px; }

  .chip {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 10px; border: 1px solid var(--line-2); border-radius: 999px;
    font-size: 11px; letter-spacing: .08em; text-transform: uppercase;

  }
  .chip .dot {
    width: 6px; height: 6px; border-radius: 999px; background: var(--accent);

  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(47,156,106,.45); }
    70% { box-shadow: 0 0 0 10px rgba(47,156,106,0); }
    100% { box-shadow: 0 0 0 0 rgba(47,156,106,0); }

  .btn {
    display: inline-flex; align-items: center; gap: 8px; white-space: nowrap;
    padding: 12px 18px; border-radius: 999px;
    font-size: 14px; font-weight: 500; letter-spacing: -0.01em;
    transition: transform .2s ease, background .2s ease, color .2s ease, border-color .2s ease;
    cursor: pointer; text-decoration: none; border: 1px solid transparent;
  }
  .btn-primary { background: var(--ink); color: var(--paper); }
  .btn-primary:hover { background: #1a1a1d; transform: translateY(-1px); }
  .btn-ghost { color: var(--ink); border-color: var(--line-2); background: transparent; }
  .btn-ghost:hover { background: rgba(11,11,12,.04); }

  .marquee { overflow: hidden; position: relative; mask-image: linear-gradient(90deg, transparent, black 12%, black 88%, transparent); -webkit-mask-image: linear-gradient(90deg, transparent, black 12%, black 88%, transparent); }
  .marquee-track { display: flex; width: max-content; gap: 72px; animation: scroll-x 40s linear infinite; }
  @keyframes scroll-x { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  @keyframes caret-blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
  @keyframes rise { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .reveal { opacity: 0; transform: translateY(18px); transition: opacity .9s ease, transform .9s cubic-bezier(.22,.61,.36,1); }
  .reveal.in { opacity: 1; transform: translateY(0); }

  .ulink { position: relative; color: var(--ink); text-decoration: none; }
  .ulink::after {
    content:""; position:absolute; left:0; right:0; bottom:-2px; height:1px;
    background: currentColor; transform-origin: right;
    transform: scaleX(1);
    transition: transform .35s cubic-bezier(.22,.61,.36,1);
  }
  .ulink:hover::after { transform: scaleX(0); transform-origin: right; }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(11,11,12,.2); border-radius: 999px; }
  ::-webkit-scrollbar-track { background: transparent; }

  .card { background: var(--paper); border: 1px solid var(--line); border-radius: 14px; box-shadow: var(--shadow-md); }
  .card-sm { border-radius: 10px; }

  .tab-btn {
    padding: 10px 14px; border-radius: 999px; font-size: 13px;
    border: 1px solid transparent; background: transparent; cursor: pointer; color: var(--ink-3);
    transition: all .2s ease; font-family: inherit;
  }
  .tab-btn[data-active="true"] { background: var(--ink); color: var(--paper); }
  .tab-btn:not([data-active="true"]):hover { color: var(--ink); background: rgba(11,11,12,.04); }

  .bar { height: 6px; border-radius: 999px; background: rgba(11,11,12,.08); overflow: hidden; }
  .bar > span { display: block; height: 100%; background: var(--accent); border-radius: 999px; transition: width 1.2s cubic-bezier(.22,.61,.36,1); }

  @media (max-width: 900px) { .hide-md { display: none !important; } }
</style>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

function Mark({ size = 22, color = "currentColor" }) {
  return (
    <svg width={size} height={size} viewBox="0 0 20 20" fill="none" style={{ display: "block" }}>
      <path d="M10 18L6.10262 10.2044L9.06061 6.78906L10 8.66667L13.3335 2H18L10 18Z" fill={color}/>
      <path d="M8.46293 5.59375L5.50493 9.00911L2 2H6.66648L8.46293 5.59375Z" fill={color}/>
    </svg>
  );
}

function Wordmark({ size = 22 }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 9 }}>
      <Mark size={size} />
      <span className="serif" style={{ fontSize: size + 6, lineHeight: 1, letterSpacing: "-0.02em" }}>
        Checkverse
      </span>
    </div>
  );
}

function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll(".reveal");
    const io = new IntersectionObserver(
      (entries) => {
        entries.forEach((e) => {
          if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); }
        });
      },
      { threshold: 0.12 }
    );
    els.forEach((el) => io.observe(el));
    return () => io.disconnect();
  }, []);
}

function Nav() {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const h = () => setScrolled(window.scrollY > 10);
    h();
    window.addEventListener("scroll", h);
    return () => window.removeEventListener("scroll", h);
  }, []);
  return (
    <nav style={{
      position: "fixed", top: 0, left: 0, right: 0, zIndex: 100,
      borderBottom: scrolled ? "1px solid var(--line)" : "1px solid transparent",
      background: scrolled ? "rgba(245,242,236,0.82)" : "transparent",
      backdropFilter: scrolled ? "blur(14px) saturate(1.2)" : "none",
      transition: "all .25s ease",

              {t}

          <a href="https://app.checkverse.io/dashboard" className="hide-md" style={{ color: "var(--ink-3)", textDecoration: "none", fontSize: 14 }}>

function HeroFragments() {

    const loop = () => {

    const t1 = setTimeout(loop, 400);
    const t2 = setTimeout(() => setVerdict(true), 3600);
    const t3 = setInterval(() => setExtracted(x => (x + 1) % 5), 1200);

              height: 6, borderRadius: 2, width: `${w}%`,

function useCountUp(target, active, duration = 1400) {
  const [n, setN] = useState(0);
  useEffect(() => {
    if (!active) return;
    let start, raf;
    const step = (t) => {
      if (!start) start = t;
      const p = Math.min(1, (t - start) / duration);
      const eased = 1 - Math.pow(1 - p, 3);
      setN(target * eased);
      if (p < 1) raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [active, target, duration]);
  return n;
}

function StatBlock({ value, suffix, label, sub, active, format = (n) => Math.round(n) }) {
  const n = useCountUp(value, active);
  return (

function HowItWorks() {
  const [step, setStep] = useState(0);
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    let intervalId = null, started = false;
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting && !started) {
          started = true;
          let i = 0;
          intervalId = setInterval(() => {
            i = i + 1;
            if (i > 3) { clearInterval(intervalId); return; }
            setStep(i);
          }, 2400);
        }
      });
    }, { threshold: 0.3 });
    io.observe(ref.current);

function MiniDemo() {
  const [phase, setPhase] = useState("idle");

  const run = () => {
    if (phase !== "idle" && phase !== "done") return;
    setPhase("uploading"); setPct(0);

      setPct(p => {

  const reset = () => { setPhase("idle"); setPct(0); };
